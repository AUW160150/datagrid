  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: #FAFAF8; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D6D3CE; border-radius: 3px; }

    @keyframes fadeUp  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
    @keyframes barGrow { from { height:0; } to { height:var(--h); } }
    @keyframes spin    { to { transform:rotate(360deg); } }
    @keyframes fillArc { from { stroke-dashoffset:var(--full); } to { stroke-dashoffset:var(--dash); } }
    @keyframes countUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    .anim-1 { animation: fadeUp 0.5s ease both; }
    .anim-2 { animation: fadeUp 0.5s ease 0.07s both; }
    .anim-3 { animation: fadeUp 0.5s ease 0.14s both; }
    .anim-4 { animation: fadeUp 0.5s ease 0.21s both; }
    .anim-5 { animation: fadeUp 0.5s ease 0.28s both; }

    .card {

    .tx-row {

    .toggle-inactive {

    }

    .nav-link {

      font-size: 13px; font-weight: 500; color: #78716C;
      cursor: pointer; transition: all 0.15s ease;

    }
    .nav-link:hover { background: #F5F4F0; color: #1C1917; }

    .bar-seg {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      border-radius: 4px 4px 0 0;
      height: var(--h);
      animation: barGrow 0.6s cubic-bezier(0.22,1,0.36,1) var(--delay, 0s) both;
    }

    .tooltip-wrap { position: relative; }
    .tooltip-wrap:hover .tooltip-box { display: block; }
    .tooltip-box {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1C1917;
      color: #FAFAF8;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 12px;
      white-space: nowrap;
      z-index: 50;
      box-shadow: 0 4px 16px rgba(28,25,23,0.25);
    }
    .tooltip-box::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #1C1917;
    }

    .btn-outline {
      padding: 8px 16px; background: transparent; color: #1C1917;

      font-family: 'DM Sans', sans-serif; font-size: 12.5px; font-weight: 500;

      transition: stroke-dasharray 0.6s cubic-bezier(0.22,1,0.36,1),
                  stroke-dashoffset 0.6s cubic-bezier(0.22,1,0.36,1);
    }
  </style>
</head>

// ── animCount helper ──────────────────────────────────────────────────────────
function animCount(setter, target, duration = 900, prefix = '', suffix = '') {
  const start = Date.now();
  const raf = () => {
    const t = Math.min((Date.now() - start) / duration, 1);
    const e = 1 - Math.pow(1 - t, 3);
    const val = Math.round(e * target);
    setter(prefix + val.toLocaleString() + suffix);
    if (t < 1) requestAnimationFrame(raf);
  };
  requestAnimationFrame(raf);
}

// ── Bar chart ─────────────────────────────────────────────────────────────────
function BarChart({ data, avgNet, chartReady }) {
  const W = 580, H = 180, pad = { t:14, b:28, l:48, r:12 };
  const plotH = H - pad.t - pad.b;
  const plotW = W - pad.l - pad.r;
  const barW  = (plotW / data.length) * 0.55;
  const gap   = plotW / data.length;

  // Average net line Y
  const avgY  = pad.t + plotH - (avgNet / GROSS_MAX) * plotH;

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow:'visible' }}>
      {/* Y grid */}
      {[0, 0.25, 0.5, 0.75, 1].map(f => {
        const y = pad.t + plotH * (1 - f);
        const val = Math.round(f * GROSS_MAX);
        return (
          <g key={f}>
            <line x1={pad.l} y1={y} x2={W - pad.r} y2={y}
              stroke={C.border} strokeWidth="0.7" strokeDasharray="3,3"/>
            <text x={pad.l - 6} y={y + 4} textAnchor="end"
              style={{ fontSize:9.5, fill:C.subtle, fontFamily:'DM Mono' }}>
              {val >= 1000 ? `$${(val/1000).toFixed(0)}k` : `$${val}`}
            </text>
          </g>
        );
      })}

      {/* Average net dashed line */}
      {chartReady && (
        <g style={{ animation:'fadeIn 0.5s ease 0.8s both', opacity:0 }}>
          <line x1={pad.l} y1={avgY} x2={W - pad.r} y2={avgY}
            stroke={C.warning} strokeWidth="1.3" strokeDasharray="5,4"/>
          <rect x={W - pad.r - 58} y={avgY - 11} width={54} height={14}
            rx="3" fill={C.warning} fillOpacity="0.12"/>
          <text x={W - pad.r - 31} y={avgY} textAnchor="middle" dominantBaseline="middle"
            style={{ fontSize:9, fill:C.warning, fontFamily:'DM Mono', fontWeight:600 }}>
            avg ${(avgNet/1000).toFixed(1)}k
          </text>
        </g>
      )}

      {/* Bars */}
      {data.map((d, i) => {
        const x    = pad.l + i * gap + gap / 2 - barW / 2;
        const netH = ((d.gross - d.fee) / GROSS_MAX) * plotH;
        const feeH = (d.fee / GROSS_MAX) * plotH;
        const yNet = pad.t + plotH - netH - feeH;
        const yFee = pad.t + plotH - feeH;
        const delay = `${0.05 + i * 0.04}s`;

        return (
          <g key={d.m} className="tooltip-wrap" style={{ cursor:'default' }}>
            {/* Fee segment (top, lighter) */}
            {chartReady && (
              <rect x={x} y={yFee} width={barW} height={feeH}
                fill={C.accent} fillOpacity="0.3" rx="0"
                style={{ animation:`fadeIn 0.4s ease ${delay} both` }}/>
            )}
            {/* Net segment (bottom, solid) */}
            {chartReady && (
              <rect x={x} y={yNet + feeH} width={barW}
                height={netH}
                fill={C.accent}
                rx="0"
                style={{
                  '--h': `${netH}px`,
                  '--delay': delay,
                  transformOrigin: `${x + barW/2}px ${pad.t + plotH}px`,
                  transformBox: 'fill-box',
                  animation: `barGrow 0.55s cubic-bezier(0.22,1,0.36,1) ${delay} both`,
                  transformOrigin2: 'bottom',
                }}/>
            )}
            {/* Rounded top cap */}
            {chartReady && (
              <rect x={x} y={yNet} width={barW} height={4}
                fill={C.accent} rx="2"
                style={{ animation:`fadeIn 0.3s ease ${parseFloat(delay)+0.3}s both`, opacity:0 }}/>
            )}
            {/* X label */}
            <text x={x + barW/2} y={H - 8} textAnchor="middle"
              style={{ fontSize:9.5, fill:C.muted, fontFamily:'DM Sans' }}>{d.m}</text>

            {/* Tooltip */}
            <foreignObject x={x - 60} y={pad.t - 80} width={150} height={72}
              style={{ pointerEvents:'none', overflow:'visible' }}>
              <div xmlns="http://www.w3.org/1999/xhtml" className="tooltip-box"
                style={{ display:'none', position:'relative', left:'50%', transform:'translateX(-50%)',
                  bottom:'auto', top:0 }}>
                <div style={{ fontWeight:700, marginBottom:3, color:'#FAFAF8' }}>{d.m} 2024</div>
                <div>Gross: <span style={{ fontFamily:'DM Mono', color:'#D1FAE5' }}>${d.gross.toLocaleString()}</span></div>
                <div>Fee (15%): <span style={{ fontFamily:'DM Mono', color:'#FDE68A' }}>−${d.fee.toLocaleString()}</span></div>
                <div>Net: <span style={{ fontFamily:'DM Mono', color:'#D1FAE5' }}>${(d.gross-d.fee).toLocaleString()}</span></div>
              </div>
            </foreignObject>
          </g>
        );
      })}
    </svg>
  );
}

// ── Donut chart ───────────────────────────────────────────────────────────────
function DonutChart({ segments, donutReady }) {
  const r = 60, cx = 90, cy = 80, stroke = 28;
  const circ = 2 * Math.PI * r;

  let cumulative = 0;
  const total = segments.reduce((s, d) => s + d.value, 0);

  return (
    <div style={{ display:'flex', alignItems:'center', gap:24 }}>
      <svg width={180} height={160} viewBox={`0 0 ${cx*2} ${cy*2+20}`}>
        <circle cx={cx} cy={cy} r={r} fill="none"
          stroke={C.surface2} strokeWidth={stroke}/>
        {segments.map((seg, i) => {
          const pct    = seg.value / total;
          const dash   = circ * pct;
          const offset = circ * (1 - cumulative);
          cumulative  += pct;
          const delay  = `${0.3 + i * 0.15}s`;

          return (
            <circle key={seg.label}
              cx={cx} cy={cy} r={r}
              fill="none"
              stroke={seg.color}
              strokeWidth={stroke}
              strokeDasharray={`${donutReady ? dash : 0} ${circ}`}
              strokeDashoffset={offset}
              style={{
                transition: `stroke-dasharray 0.7s cubic-bezier(0.22,1,0.36,1) ${delay}`,
                transform: 'rotate(-90deg)',
                transformOrigin: `${cx}px ${cy}px`,
              }}/>
          );
        })}
        {/* Centre label */}
        <text x={cx} y={cy - 4} textAnchor="middle"
          style={{ fontSize:18, fontFamily:'DM Mono', fontWeight:500, fill:C.primary }}>
          $677K
        </text>
        <text x={cx} y={cy + 13} textAnchor="middle"
          style={{ fontSize:9.5, fill:C.muted, fontFamily:'DM Sans' }}>
          total spend
        </text>
      </svg>

      {/* Legend */}
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {segments.map(seg => (
          <div key={seg.label} style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:10, height:10, borderRadius:'50%', background:seg.color, flexShrink:0 }}/>
            <div>
              <div style={{ fontSize:12.5, fontWeight:500, color:C.primary }}>{seg.label}</div>
              <div style={{ fontSize:11, fontFamily:'DM Mono', color:C.muted }}>{seg.value}%</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

    'Processing': { bg:'#EFF6FF', border:'#BFDBFE', color:'#2563EB', icon:'🔄' },

    'Active':     { bg:'rgba(13,148,136,0.08)', border:'rgba(13,148,136,0.25)', color:'#0D9488', icon:'●' },
    'Expired':    { bg:'#FFF1F2', border:'#FECDD3', color:'#E11D48', icon:'✗' },
    'Expiring':   { bg:'#FFFBEB', border:'#FDE68A', color:'#D97706', icon:'⚠' },

  const s = map[status] || map['Pending'];
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:4,

      background:s.bg, border:`1px solid ${s.border}`, color:s.color }}>
      <span style={{ fontSize:10 }}>{s.icon}</span>
      {status}
    </span>
  );
}

                    const x = 30 + i*64, barW=38, maxH=100;

                      <g key={q}>
                        <rect x={x} y={14+maxH-h} width={barW} height={h}
