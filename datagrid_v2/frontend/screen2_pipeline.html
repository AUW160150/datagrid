  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: #FAFAF8; -webkit-font-smoothing: antialiased; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D6D3CE; border-radius: 2px; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulseLeft {
      0%, 100% { box-shadow: inset 3px 0 0 #0D9488, 0 0 0 rgba(13,148,136,0); }
      50%       { box-shadow: inset 3px 0 0 #0D9488, 0 0 12px rgba(13,148,136,0.2); }
    }
    @keyframes slideLog {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fillBar {
      from { height: 0; }
      to   { height: var(--target-h); }
    }
    @keyframes drawRadar {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes progressFill {
      from { width: 0%; }
    }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid rgba(13,148,136,0.2);
      border-top-color: #0D9488;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .agent-running { animation: pulseLeft 1.5s ease-in-out infinite; }
    .log-entry     { animation: slideLog 0.25s ease forwards; }

    .conf-high   { background: rgba(5,150,105,0.1);  color: #059669; border: 1px solid rgba(5,150,105,0.25);  }
    .conf-good   { background: rgba(13,148,136,0.1); color: #0D9488; border: 1px solid rgba(13,148,136,0.25); }
    .conf-warn   { background: rgba(217,119,6,0.1);  color: #D97706; border: 1px solid rgba(217,119,6,0.25);  }
    .conf-low    { background: rgba(220,38,38,0.1);  color: #DC2626; border: 1px solid rgba(220,38,38,0.25);  }

    .panel {
      background: #FFFFFF;
      border: 1px solid #E7E5E0;
      border-radius: 12px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .panel-head {
      padding: 14px 18px;
      border-bottom: 1px solid #E7E5E0;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;

      font-family: 'Playfair Display', serif;
      font-size: 13px; font-weight: 600;
      color: #1C1917; letter-spacing: -0.1px;

/* ─── Helpers ─── */
const confClass = c => c >= 0.90 ? 'conf-high' : c >= 0.85 ? 'conf-good' : c >= 0.75 ? 'conf-warn' : 'conf-low';
const fmtConf   = c => c.toFixed(2);

const animCount = (setter, target, ms = 900) => {
  const start = Date.now();
  const step = () => {
    const p = Math.min((Date.now() - start) / ms, 1);
    const e = 1 - Math.pow(1 - p, 3);
    setter(Math.round(e * target));
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
};

/* ─── Mini components ─── */
const FmtBadge = ({ fmt }) => {
  const map = {
    TXT:     { bg:'#F5F4F0', c:'#78716C' },
    CSV:     { bg:'rgba(13,148,136,0.06)', c:'#0D9488' },
    VCF:     { bg:'#FFFBEB', c:'#B45309' },
    PARQUET: { bg:'#F0FFF8', c:'#059669' },
    JSON:    { bg:'#F5F4F0', c:'#1C1917' },
  };
  const s = map[fmt] || map.TXT;
  return (
    <span style={{ ...mono, fontSize:'9px', fontWeight:'600', letterSpacing:'0.4px', textTransform:'uppercase',
                   padding:'1px 6px', borderRadius:'3px', background:s.bg, color:s.c, flexShrink:0 }}>
      {fmt}
    </span>
  );
};

const LangPill = ({ lang, flag }) => {
  if (!lang || lang === '—' || lang === 'VCF' || lang === 'EN') return null;
  const map = {
    Bengali: { bg:'rgba(13,148,136,0.06)', c:'#0D9488', b:'rgba(13,148,136,0.15)' },
    Hindi:   { bg:'#FFFBEB', c:'#B45309', b:'#FDE68A' },
  };
  const s = map[lang];
  if (!s) return null;
  return (
    <span style={{ fontSize:'10px', fontWeight:'500', padding:'1px 7px', borderRadius:'20px',
                   background:s.bg, color:s.c, border:`1px solid ${s.b}`, flexShrink:0 }}>
      {flag} {lang}
    </span>
  );
};

/* ─── Log entry renderer ─── */
const LogEntry = ({ entry }) => {
  const base = {
    padding:'8px 14px', fontSize:'12px', lineHeight:'1.55',
    borderLeft:'3px solid transparent',
    borderBottom:`1px solid ${C.border}`,
    display:'flex', gap:'10px', alignItems:'flex-start',
    background:C.surface,

  if (entry.k === 'info') return (
    <div className="log-entry" style={{ ...base, borderLeftColor:'#D6D3CE' }}>
      <span style={{ color:C.muted, flexShrink:0, marginTop:'1px' }}>›</span>
      <span style={{ color:C.muted }}>{entry.txt}</span>
    </div>
  );

  if (entry.k === 'file') return (
    <div className="log-entry" style={{ ...base, borderLeftColor: entry.fmt==='PARQUET' ? C.success : C.accent, alignItems:'center', gap:'8px' }}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style={{ flexShrink:0 }}>
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8L14 2z" stroke={C.muted} strokeWidth="1.8"/>
        <path d="M14 2v6h6" stroke={C.muted} strokeWidth="1.8" strokeLinecap="round"/>

      <FmtBadge fmt={entry.fmt}/>
      {entry.lang && entry.lang !== '—' && <LangPill lang={entry.lang} flag={entry.flag}/>}

  );

    <div className="log-entry" style={{ ...base, borderLeftColor: entry.flag ? C.warning : C.accent, flexDirection:'column', gap:'5px', padding:'8px 14px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap' }}>
        <LangPill lang={entry.lang} flag={null}/>
        <span style={{ ...mono, fontSize:'12px', color:C.primary, fontWeight:'500' }}>{entry.src}</span>
        {entry.flag && <span style={{ fontSize:'10px', color:C.warning, fontWeight:'600' }}>⚑ flagged</span>}

      <div style={{ display:'flex', alignItems:'center', gap:'6px', flexWrap:'wrap' }}>
        <span style={{ fontSize:'10.5px', color:C.muted }}>→</span>
        {entry.icd !== '—' && <>
          <span style={{ ...mono, fontSize:'10.5px', color:C.primary, background:C.s2, padding:'1px 6px', borderRadius:'3px' }}>ICD-10: {entry.icd}</span>
          <span style={{ color:C.border }}>·</span>
        </>}
        <span style={{ ...mono, fontSize:'10.5px', color:C.primary, background:C.s2, padding:'1px 6px', borderRadius:'3px' }}>OMOP: {entry.omop}</span>
        <span className={confClass(entry.conf)} style={{ ...mono, fontSize:'10px', fontWeight:'600', padding:'1px 7px', borderRadius:'20px' }}>
          conf: {fmtConf(entry.conf)}
        </span>
      </div>
    </div>
  );

  if (entry.k === 'correction') return (
    <div className="log-entry" style={{ ...base, borderLeftColor:C.warning, flexDirection:'column', gap:'4px', background:'rgba(217,119,6,0.02)' }}>
      <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
        <span style={{ fontSize:'9.5px', fontWeight:'700', letterSpacing:'0.5px', textTransform:'uppercase', color:C.warning }}>Correction</span>
        <div style={{ display:'flex', alignItems:'center', gap:'5px' }}>
          <span style={{ ...mono, fontSize:'11.5px', color:C.error, textDecoration:'line-through' }}>{entry.before}</span>
          <span style={{ color:C.muted, fontSize:'12px' }}>→</span>
          <span style={{ ...mono, fontSize:'11.5px', color:C.success, fontWeight:'600' }}>{entry.after}</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:'4px', marginLeft:'4px' }}>
          <span className="conf-warn" style={{ ...mono, fontSize:'10px', padding:'1px 6px', borderRadius:'20px' }}>{fmtConf(entry.cb)}</span>
          <span style={{ color:C.muted, fontSize:'11px' }}>→</span>
          <span className="conf-good" style={{ ...mono, fontSize:'10px', padding:'1px 6px', borderRadius:'20px' }}>{fmtConf(entry.ca)}</span>
        </div>
      </div>
      <div style={{ fontSize:'11px', color:C.muted }}>{entry.reason}</div>
    </div>
  );

  if (entry.k === 'confirm') return (
    <div className="log-entry" style={{ ...base, borderLeftColor:C.success }}>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ flexShrink:0, marginTop:'2px' }}>
        <circle cx="6" cy="6" r="5" stroke={C.success} strokeWidth="1.3"/>
        <path d="M3.5 6l1.8 1.8L8.5 4" stroke={C.success} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      <span style={{ color:C.primary }}>{entry.txt}</span>
    </div>
  );

  if (entry.k === 'warning') return (
    <div className="log-entry" style={{ ...base, borderLeftColor:C.warning, background:'rgba(217,119,6,0.02)' }}>
      <span style={{ flexShrink:0, fontSize:'12px' }}>⚠</span>
      <span style={{ color:C.warning, fontWeight:'500' }}>{entry.txt}</span>
    </div>
  );

  if (entry.k === 'match') return (
    <div className="log-entry" style={{ ...base, borderLeftColor:C.accent, alignItems:'center' }}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style={{ flexShrink:0 }}>
        <path d="M22 11.08V12a10 10 0 11-5.93-9.14" stroke={C.accent} strokeWidth="2" strokeLinecap="round"/>
        <path d="M22 4L12 14.01l-3-3" stroke={C.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      <span style={{ fontWeight:'600', color:C.primary }}>{entry.company}</span>
      <span style={{ color:C.muted, flex:1 }}>{entry.desc}</span>
      <span style={{
        ...mono, fontSize:'11px', fontWeight:'600', padding:'2px 9px', borderRadius:'20px', flexShrink:0,
        background: entry.score >= 0.88 ? 'rgba(5,150,105,0.1)' : entry.score >= 0.80 ? 'rgba(13,148,136,0.1)' : 'rgba(217,119,6,0.1)',
        color: entry.score >= 0.88 ? C.success : entry.score >= 0.80 ? C.accent : C.warning,
      }}>
        {entry.score.toFixed(2)}
      </span>
    </div>
  );

  if (entry.k === 'success') return (
    <div className="log-entry" style={{ ...base, borderLeftColor:C.success, background:'rgba(5,150,105,0.02)' }}>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ flexShrink:0, marginTop:'2px' }}>
        <circle cx="6" cy="6" r="5" fill={C.success}/>
        <path d="M3.5 6l1.8 1.8L8.5 4" stroke="white" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
      <span style={{ color:C.success, fontWeight:'500' }}>{entry.txt}</span>
    </div>
  );

  if (entry.k === 'complete') return (
    <div className="log-entry" style={{ ...base, borderLeftColor:C.primary, background:C.s2, padding:'12px 14px' }}>
      <span style={{ fontWeight:'700', color:C.primary, fontSize:'13px' }}>{entry.txt}</span>
    </div>
  );

  return null;
};

/* ─── Radar chart ─── */
const RadarChart = ({ visible, progress }) => {
  const cx = 90, cy = 90, r = 66;
  const labels = ['Disease\nCoverage', 'Modality\nComplete', 'Demographic\nDiversity', 'Data\nQuality', 'OMOP\nComplete'];
  const scores  = [0.88, 0.81, 0.79, 0.88, 0.94];
  const n = labels.length;

  const pts = scores.map((s, i) => {
    const angle = (i * 2 * Math.PI / n) - Math.PI / 2;
    return {
      x: cx + s * r * progress * Math.cos(angle),
      y: cy + s * r * progress * Math.sin(angle),
      lx: cx + (r + 20) * Math.cos(angle),
      ly: cy + (r + 20) * Math.sin(angle),
      score: s,
    };
  });

  const gridPts = (frac) => scores.map((_, i) => {
    const angle = (i * 2 * Math.PI / n) - Math.PI / 2;
    return `${cx + frac * r * Math.cos(angle)},${cy + frac * r * Math.sin(angle)}`;
  }).join(' ');

  const polyPoints = pts.map(p => `${p.x},${p.y}`).join(' ');

  return (
    <div style={{ opacity: visible ? 1 : 0, transition:'opacity 0.5s ease' }}>
      <svg viewBox="0 0 180 180" width="100%" height="160">
        {/* Grid rings */}
        {[0.25, 0.5, 0.75, 1.0].map(f => (
          <polygon key={f} points={gridPts(f)}
                   fill="none" stroke={C.border} strokeWidth="0.8" opacity="0.7"/>
        ))}
        {/* Axes */}
        {scores.map((_, i) => {
          const angle = (i * 2 * Math.PI / n) - Math.PI / 2;
          return (
            <line key={i}
                  x1={cx} y1={cy}
                  x2={cx + r * Math.cos(angle)}
                  y2={cy + r * Math.sin(angle)}
                  stroke={C.border} strokeWidth="0.8"/>
          );
        })}
        {/* Filled polygon */}
        <polygon points={polyPoints}
                 fill={`rgba(13,148,136,0.12)`}
                 stroke={C.accent} strokeWidth="1.8"
                 strokeLinejoin="round"
                 style={{ transition:'all 0.1s ease' }}/>
        {/* Data points */}
        {pts.map((p, i) => (
          <circle key={i} cx={p.x} cy={p.y} r="3"
                  fill={C.accent} stroke="white" strokeWidth="1"/>
        ))}
        {/* Score labels on axes */}
        {pts.map((p, i) => (
          <text key={i}
                x={p.lx} y={p.ly}
                textAnchor="middle" dominantBaseline="middle"
                style={{ ...mono, fontSize:'7px', fill:C.accent, fontWeight:'500' }}
          >
            {progress > 0.8 ? scores[i].toFixed(2) : ''}
          </text>
        ))}
      </svg>
      {/* Axis labels below */}
      <div style={{ display:'flex', justifyContent:'space-around', marginTop:'-8px' }}>
        {['Disease', 'Modality', 'Diversity', 'Quality', 'OMOP'].map(l => (
          <div key={l} style={{ fontSize:'9px', color:C.muted, textAlign:'center', width:'32px', lineHeight:'1.3' }}>{l}</div>
        ))}
      </div>
    </div>
  );
};

/* Build a dynamic log timeline by splicing in real uploaded files */
function buildTimeline(uploadedFiles) {
  if (!uploadedFiles || !uploadedFiles.length) return LOG_TIMELINE;

  // Replace the k:'file' entries in the ingestion window (t < 2000) with real files
  const fileSlots = [880, 1050, 1220, 1390, 1560, 1730];
  const fileEvents = uploadedFiles.slice(0, fileSlots.length).map((f, i) => ({
    t: fileSlots[i], k: 'file',
    name: f.name, fmt: f.fmt || 'TXT',
    lang: f.lang || '—', flag: f.flag || null, size: f.size || '—'
  }));

  // Keep all non-file entries from original timeline, plus add real file entries
  const rest = LOG_TIMELINE.filter(e => !(e.k === 'file' && e.t < 2000));
  return [...fileEvents, ...rest].sort((a, b) => a.t - b.t);
}

      return { hospital, location, files };
    } catch { return { hospital:'SSKM Kolkata', location:'Kolkata, West Bengal 🇮🇳', files:null }; }
  });

  const [agentStates, setAgentStates] = useState(
    Object.fromEntries(AGENTS.map(a => [a.key, 'waiting']))
  );
  const [logEntries, setLogEntries]   = useState([]);
  const [progress, setProgress]       = useState(0);
  const [timeLeft, setTimeLeft]       = useState(Math.ceil(TOTAL_MS * DEMO_SPEED / 1000));

  const [radarProgress, setRadarProgress] = useState(0);

  // Poll API status when in live mode
  useEffect(() => {
    if (apiMode !== 'live' || !jobId) return;
    const poll = setInterval(() => {
      fetch(`${API_BASE}/api/pipeline/status/${jobId}`)

        .then(data => {
          if (data.status === 'complete') clearInterval(poll);
        })
        .catch(() => clearInterval(poll));

    return () => clearInterval(poll);

  // Auto-scroll log
  useEffect(() => {
    if (logRef.current) {
      logRef.current.scrollTop = logRef.current.scrollHeight;
    }
  }, [logEntries]);

  // Animate radar when visible
  useEffect(() => {
    if (!showRadar) return;
    const start = Date.now();
    const anim = () => {
      const p = Math.min((Date.now() - start) / 1600, 1);

      if (p < 1) requestAnimationFrame(anim);

        const p = Math.min((Date.now() - start) / dur, 1);

        if (p < 1) requestAnimationFrame(anim);
      };
      requestAnimationFrame(anim);
    }, 2200 * DEMO_SPEED);
    timers.current.push(donutStart);

    return () => timers.current.forEach(id => { clearTimeout(id); clearInterval(id); });
  }, []);

            </div>
            <span style={{ fontSize:'11px', color:C.muted, fontWeight:'500' }}>Dify</span>
            <span style={{ fontSize:'9.5px', color:'#2563EB', fontWeight:'600', background:'rgba(37,99,235,0.1)',
                           padding:'1px 5px', borderRadius:'3px', ...mono }}>streaming</span>
          </div>
        </div>
      </nav>

      {/* ── 3-column body ── */}
      <div style={{ flex:1, display:'flex', gap:'0', overflow:'hidden', padding:'14px 14px 0' }}>

        {/* LEFT — Agent stepper */}
        <div style={{ width:'220px', flexShrink:0, marginRight:'12px', display:'flex', flexDirection:'column', gap:'0' }}>
          <div style={{ ...serif, fontSize:'12px', fontWeight:'600', color:C.muted,
                        letterSpacing:'0.3px', marginBottom:'10px', paddingLeft:'2px' }}>
            Agent Pipeline
          </div>
          <div className="panel" style={{ flex:1, overflow:'hidden' }}>
            {AGENTS.map(agent => (
              <AgentCard key={agent.key} agent={agent} state={agentStates[agent.key]}/>
            ))}
          </div>
        </div>

        {/* CENTER — Live log */}
        <div style={{ flex:'1 1 0', marginRight:'12px', display:'flex', flexDirection:'column', minWidth:0 }}>
          <div style={{ ...serif, fontSize:'12px', fontWeight:'600', color:C.muted,
                        letterSpacing:'0.3px', marginBottom:'10px', paddingLeft:'2px' }}>
            Live Agent Output
          </div>
          <div className="panel" style={{ flex:1, overflow:'hidden' }}>
            <div className="panel-head">
              <span className="panel-title">Processing Log</span>
              <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                <div style={{ ...mono, fontSize:'10px', color:C.muted }}>{logEntries.length} events</div>
                {!done && <div className="spinner" style={{ width:'11px', height:'11px' }}/>}
              </div>
            </div>
            <div ref={logRef} style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column' }}>
              {logEntries.length === 0 ? (
                <div style={{ padding:'24px', textAlign:'center', color:C.muted, fontSize:'12px' }}>
                  Waiting for pipeline to start…
                </div>
              ) : logEntries.map((entry, i) => (
                <LogEntry key={i} entry={entry}/>
              ))}
            </div>
          </div>
        </div>

        {/* RIGHT — Visualizations */}
        <div style={{ width:'240px', flexShrink:0, display:'flex', flexDirection:'column' }}>
          <div style={{ ...serif, fontSize:'12px', fontWeight:'600', color:C.muted,
                        letterSpacing:'0.3px', marginBottom:'10px', paddingLeft:'2px' }}>
            Live Metrics
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:'10px', flex:1, overflowY:'auto' }}>

            {/* Counters */}
            <div style={{ display:'flex', gap:'6px' }}>
              <Counter label="Patients" value={patients} active={patients > 0}/>
              <Counter label="Entities" value={entities} active={entities > 0}/>
              <Counter label="Corrected" value={corrections} active={corrections > 0}/>
            </div>

            {/* Modality donut */}
            <div className="panel" style={{ padding:'14px' }}>
              <div style={{ fontSize:'11px', fontWeight:'600', color:C.muted, letterSpacing:'0.5px',
                            textTransform:'uppercase', marginBottom:'12px' }}>Modality Coverage</div>
              <ModalityCoverage progress={donutProgress}/>
            </div>

            {/* Confidence bar chart */}
            <div className="panel" style={{ padding:'14px' }}>
              <div style={{ fontSize:'11px', fontWeight:'600', color:C.muted, letterSpacing:'0.5px',
                            textTransform:'uppercase', marginBottom:'10px' }}>
                Confidence Distribution
              </div>
              <ConfBar barProgress={barProgress}/>
              <div style={{ display:'flex', gap:'8px', marginTop:'8px', flexWrap:'wrap' }}>
                {[[C.success,'≥0.90'],[C.accent,'0.85+'],[C.warning,'0.75+'],[C.error,'<0.75']].map(([c,l]) => (
                  <div key={l} style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                    <div style={{ width:'6px', height:'6px', borderRadius:'1px', background:c }}/>
                    <span style={{ fontSize:'9px', color:C.muted, ...mono }}>{l}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Radar chart */}
            <div className="panel" style={{ padding:'14px' }}>
              <div style={{ fontSize:'11px', fontWeight:'600', color:C.muted, letterSpacing:'0.5px',
                            textTransform:'uppercase', marginBottom:'8px' }}>
                Dataset Profile
                {!showRadar && <span style={{ fontSize:'9.5px', fontWeight:'400', marginLeft:'6px', color:C.border }}>(after completion)</span>}
              </div>
              {showRadar
                ? <RadarChart visible={showRadar} progress={radarProgress}/>
                : (
                  <div style={{ height:'130px', display:'flex', alignItems:'center', justifyContent:'center',
                                border:`1px dashed ${C.border}`, borderRadius:'6px', background:C.s2 }}>
                    <span style={{ fontSize:'11px', color:C.border }}>Awaiting pipeline…</span>
                  </div>
                )
              }
            </div>

            {/* ── Sponsor Dashboards ── */}

            {/* HydraDB */}
            <div className="panel" style={{ padding:'12px',
              border: hydraStatus==='active' ? '1px solid rgba(14,165,233,0.4)' : '1px solid #E7E5E0',
              background: hydraStatus==='active' ? 'rgba(14,165,233,0.03)' : 'white',
              transition:'all 0.4s ease',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:'7px', marginBottom:'9px' }}>
                <div style={{ width:'18px', height:'18px', background:'#0EA5E9', borderRadius:'4px',
                              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span style={{ fontSize:'9px', color:'white', fontWeight:'800' }}>HD</span>
                </div>
                <span style={{ fontSize:'11px', fontWeight:'700', color:C.primary }}>HydraDB</span>
                <span style={{ ...mono, fontSize:'9px', fontWeight:'600', padding:'1px 5px', borderRadius:'3px',
                  color: hydraStatus==='active' ? '#0EA5E9' : C.border,
                  background: hydraStatus==='active' ? 'rgba(14,165,233,0.1)' : C.s2,
                  marginLeft:'auto',
                }}>
                  {hydraStatus==='idle' ? 'idle' : hydraStatus==='creating' ? 'creating…' : 'persisting'}
                </span>
              </div>
              {[
                ['Session', hydraId || '—'],
                ['Role', 'persistent audit trail'],
                ['Retained', 'conf scores · flags · mappings'],
              ].map(([l,v]) => (
                <div key={l} style={{ display:'flex', justifyContent:'space-between', marginBottom:'4px' }}>
                  <span style={{ fontSize:'10px', color:C.muted }}>{l}</span>
                  <span style={{ ...mono, fontSize:'9.5px', color:C.primary }}>{v}</span>
                </div>
              ))}
            </div>

            {/* Auth0 */}
            <div className="panel" style={{ padding:'12px',
              border: auth0Tokens > 0 ? '1px solid rgba(98,0,234,0.2)' : '1px solid #E7E5E0',
              background: auth0Tokens > 0 ? 'rgba(98,0,234,0.02)' : 'white',
              transition:'all 0.4s ease',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:'7px', marginBottom:'9px' }}>
                <div style={{ width:'18px', height:'18px', background:'#6200EA', borderRadius:'4px',
                              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span style={{ fontSize:'8px', color:'white', fontWeight:'800' }}>A0</span>
                </div>
                <span style={{ fontSize:'11px', fontWeight:'700', color:C.primary }}>Auth0 M2M</span>
                <span style={{ ...mono, fontSize:'9px', fontWeight:'600', padding:'1px 5px', borderRadius:'3px',
                  color: auth0Tokens > 0 ? '#6200EA' : C.border,
                  background: auth0Tokens > 0 ? 'rgba(98,0,234,0.08)' : C.s2,
                  marginLeft:'auto',
                }}>
                  {auth0Tokens}/5 agents
                </span>
              </div>
              {[
                ['Tokens issued', `${auth0Tokens} / 5`],
                ['Grant type', 'client_credentials'],
                ['TTL', '24 h · cached'],
              ].map(([l,v]) => (
                <div key={l} style={{ display:'flex', justifyContent:'space-between', marginBottom:'4px' }}>
                  <span style={{ fontSize:'10px', color:C.muted }}>{l}</span>
                  <span style={{ ...mono, fontSize:'9.5px', color:C.primary }}>{v}</span>
                </div>
              ))}
              <div style={{ marginTop:'8px', height:'3px', background:C.s2, borderRadius:'2px', overflow:'hidden' }}>
                <div style={{ height:'100%', background:'#6200EA', borderRadius:'2px',
                              width:`${(auth0Tokens/5)*100}%`, transition:'width 0.5s ease' }}/>
              </div>
            </div>

            {/* Photon Skills */}
            <div className="panel" style={{ padding:'12px',
              border: photonFiles > 0 ? '1px solid rgba(124,58,237,0.25)' : '1px solid #E7E5E0',
              background: photonFiles > 0 ? 'rgba(124,58,237,0.02)' : 'white',
              transition:'all 0.4s ease',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:'7px', marginBottom:'9px' }}>
                <div style={{ width:'18px', height:'18px', background:'#7C3AED', borderRadius:'4px',
                              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span style={{ fontSize:'8px', color:'white', fontWeight:'800' }}>PH</span>
                </div>
                <span style={{ fontSize:'11px', fontWeight:'700', color:C.primary }}>Photon Skills</span>
                <span style={{ ...mono, fontSize:'9px', fontWeight:'600', padding:'1px 5px', borderRadius:'3px',
                  color: photonFiles > 0 ? '#7C3AED' : C.border,
                  background: photonFiles > 0 ? 'rgba(124,58,237,0.08)' : C.s2,
                  marginLeft:'auto',
                }}>
                  {photonFiles}/10 files
                </span>
              </div>
              {[
                ['Records ingested', `${photonFiles} / 10`],
                ['Role', 'zero-friction UI surfacing'],
                ['Formats', 'TXT · CSV · VCF'],
              ].map(([l,v]) => (
                <div key={l} style={{ display:'flex', justifyContent:'space-between', marginBottom:'4px' }}>
                  <span style={{ fontSize:'10px', color:C.muted }}>{l}</span>
                  <span style={{ ...mono, fontSize:'9.5px', color:C.primary }}>{v}</span>
                </div>
              ))}
              <div style={{ marginTop:'8px', height:'3px', background:C.s2, borderRadius:'2px', overflow:'hidden' }}>
                <div style={{ height:'100%', background:'#7C3AED', borderRadius:'2px',
                              width:`${(photonFiles/10)*100}%`, transition:'width 0.5s ease' }}/>
              </div>
            </div>

            {/* Dify */}
            <div className="panel" style={{ padding:'12px',
              border: difyCalls > 0 ? '1px solid rgba(37,99,235,0.25)' : '1px solid #E7E5E0',
              background: difyCalls > 0 ? 'rgba(37,99,235,0.02)' : 'white',
              transition:'all 0.4s ease',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:'7px', marginBottom:'9px' }}>
                <div style={{ width:'18px', height:'18px', background:'#2563EB', borderRadius:'4px',
                              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span style={{ fontSize:'8px', color:'white', fontWeight:'800' }}>DF</span>
                </div>
                <span style={{ fontSize:'11px', fontWeight:'700', color:C.primary }}>Dify</span>
                <span style={{ ...mono, fontSize:'9px', fontWeight:'600', padding:'1px 5px', borderRadius:'3px',
                  color: difyCalls > 0 ? '#2563EB' : C.border,
                  background: difyCalls > 0 ? 'rgba(37,99,235,0.08)' : C.s2,
                  marginLeft:'auto',
                }}>
                  {difyCalls}/7 nodes
                </span>
              </div>
              {[
                ['Nodes complete', `${difyCalls} / 7`],
                ['Features', 'retry · tracing · RAG'],
                ['Workflow', 'clinical-harmonization'],
              ].map(([l,v]) => (
                <div key={l} style={{ display:'flex', justifyContent:'space-between', marginBottom:'4px' }}>
                  <span style={{ fontSize:'10px', color:C.muted }}>{l}</span>
                  <span style={{ ...mono, fontSize:'9.5px', color:C.primary }}>{v}</span>
                </div>
              ))}
              <div style={{ marginTop:'8px', height:'3px', background:C.s2, borderRadius:'2px', overflow:'hidden' }}>
                <div style={{ height:'100%', background:'#2563EB', borderRadius:'2px',
                              width:`${(difyCalls/7)*100}%`, transition:'width 0.5s ease' }}/>
              </div>
            </div>

            {/* GMI Cloud */}
            <div className="panel" style={{ padding:'12px',
              border: gmiCalls > 0 ? '1px solid rgba(5,150,105,0.25)' : '1px solid #E7E5E0',
              background: gmiCalls > 0 ? 'rgba(5,150,105,0.02)' : 'white',
              transition:'all 0.4s ease',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:'7px', marginBottom:'9px' }}>
                <div style={{ width:'18px', height:'18px', background:'#059669', borderRadius:'4px',
                              display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <span style={{ fontSize:'7px', color:'white', fontWeight:'800' }}>GMI</span>
                </div>
                <span style={{ fontSize:'11px', fontWeight:'700', color:C.primary }}>GMI Cloud</span>
                <span style={{ ...mono, fontSize:'9px', fontWeight:'600', padding:'1px 5px', borderRadius:'3px',
                  color: gmiCalls > 0 ? C.success : C.border,
                  background: gmiCalls > 0 ? 'rgba(5,150,105,0.08)' : C.s2,
                  marginLeft:'auto',
                }}>
                  {gmiCalls} calls
                </span>
              </div>
              {[
                ['Inference calls', `${gmiCalls}`],
                ['Model', 'Kimi K2.5'],
                ['Languages', 'Bengali · Hindi · English'],
              ].map(([l,v]) => (
                <div key={l} style={{ display:'flex', justifyContent:'space-between', marginBottom:'4px' }}>
                  <span style={{ fontSize:'10px', color:C.muted }}>{l}</span>
                  <span style={{ ...mono, fontSize:'9.5px', color:C.primary }}>{v}</span>
                </div>
              ))}
              <div style={{ marginTop:'8px', height:'3px', background:C.s2, borderRadius:'2px', overflow:'hidden' }}>
                <div style={{ height:'100%', background:C.success, borderRadius:'2px',
                              width:`${Math.min((gmiCalls/10)*100,100)}%`, transition:'width 0.5s ease' }}/>
              </div>
            </div>

          </div>
        </div>
      </div>

      {/* ── Progress bar ── */}
      <div style={{ padding:'12px 14px 14px', flexShrink:0 }}>
        <div style={{ background:C.surface, borderRadius:'10px', border:`1px solid ${C.border}`,
                      padding:'10px 16px', display:'flex', flexDirection:'column', gap:'8px' }}>
          {/* Top row */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
              <span style={{ ...mono, fontSize:'13px', fontWeight:'600', color:C.primary }}>{pct}%</span>
              <span style={{ fontSize:'12px', color:C.muted }}>
                {done ? 'Pipeline complete — Dify 7/7 nodes · audit trail retained in HydraDB' :
                 pct < 9  ? 'Photon: surfacing hospital submission interface' :
                 pct < 18 ? 'HydraDB: loading persistent OMOP concept store' :
                 pct < 43 ? 'GMI Cloud: Kimi K2.5 harmonizing Bengali/Hindi/English' :
                 pct < 59 ? 'Dify Node 4: Kimi K2.5 validation · retry logic active' :
                 pct < 70 ? 'HydraDB: persisting OMOP profile + confidence scores' :
                 pct < 84 ? 'HydraDB: cross-session buyer matching' :
                            'HydraDB: writing full provenance · audit trail retained'}
              </span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:'12px' }}>
              {!done && (
                <span style={{ ...mono, fontSize:'12px', color:C.muted }}>
                  ~{timeLeft >= 60 ? `${Math.floor(timeLeft/60)}m ${timeLeft%60}s` : `${timeLeft}s`} remaining
                </span>
              )}
              {done && (
                <button onClick={() => { window.location.href = 'screen3_results.html'; }} style={{
                  padding:'6px 16px', background:C.accent, border:'none', borderRadius:'7px',
                  color:'white', fontSize:'12px', fontWeight:'600', cursor:'pointer',
                  fontFamily:"'DM Sans',sans-serif", display:'flex', alignItems:'center', gap:'6px',
                }}>
                  View Results →
                </button>
              )}
              {/* Dify cloud badge */}
              <div style={{ display:'flex', alignItems:'center', gap:'5px' }}>
                <span style={{ fontSize:'10px', color:C.muted }}>Orchestrated by</span>
                <div style={{ width:'12px', height:'12px', background:'#2563EB', borderRadius:'2px',
                              display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <span style={{ fontSize:'7px', color:'white', fontWeight:'800' }}>DF</span>
                </div>
                <span style={{ fontSize:'10px', color:'#2563EB', fontWeight:'600' }}>Dify</span>
              </div>
            </div>
          </div>
          {/* Bar */}
          <div style={{ height:'5px', background:C.s2, borderRadius:'3px', overflow:'hidden' }}>
            <div style={{
              height:'100%', borderRadius:'3px',
              background: done
                ? `linear-gradient(to right, ${C.success}, ${C.accent})`
                : `linear-gradient(to right, ${C.accent}, #0D9488)`,
              width:`${pct}%`,
              transition:'width 0.08s linear',
            }}/>
          </div>
          {/* Agent mini-status */}
          <div style={{ display:'flex', gap:'6px', alignItems:'center' }}>
            {AGENTS.map(agent => (
              <div key={agent.key} style={{ display:'flex', alignItems:'center', gap:'4px' }}>
                <div style={{
                  width:'6px', height:'6px', borderRadius:'50%',
                  background: agentStates[agent.key] === 'done'    ? C.success :
                              agentStates[agent.key] === 'running'  ? C.accent  : C.border,
                  transition:'background 0.3s ease',
                }}/>
                <span style={{ fontSize:'9.5px', color:
                  agentStates[agent.key] === 'done'   ? C.success :
                  agentStates[agent.key] === 'running' ? C.accent  : C.border,
                  ...mono, transition:'color 0.3s ease',
                }}>
                  {agent.label.replace(' Agent','').split(' ')[0]}
                </span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ─── App ─── */
const App = () => {
  const [screen, setScreen] = useState('pipeline');
  if (screen === 'pipeline') return <Screen2 onNavigate={setScreen}/>;
  return (
    <div style={{ height:'100vh', background:C.bg, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'DM Sans',sans-serif" }}>
      <div style={{ textAlign:'center' }}>
        <div style={{ ...serif, fontSize:'16px', color:C.primary, marginBottom:'6px', fontWeight:'600' }}>
          {screen === 'results' ? 'Screen 3 — Packaging Complete' : 'Hospital Dashboard'}
        </div>
        <div style={{ fontSize:'13px', color:C.muted, marginBottom:'20px' }}>Coming next</div>
        <button onClick={() => setScreen('pipeline')} style={{
          padding:'8px 18px', background:C.accent, border:'none', borderRadius:'7px',
          color:'white', cursor:'pointer', fontSize:'13px', fontFamily:"'DM Sans',sans-serif",
        }}>← Back to Pipeline</button>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
