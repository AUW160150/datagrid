function buildAreaPath(vals, maxV, W, H, pad) {
  const pts = vals.map((v, i) => ({
    x: pad + i * (W - 2*pad) / (vals.length - 1),
    y: H - pad - (v / maxV) * (H - 2*pad)
  }));
  const line = pts.map((p,i) => `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area = line + ` L${pts[pts.length-1].x.toFixed(1)},${(H-pad).toFixed(1)} L${pts[0].x.toFixed(1)},${(H-pad).toFixed(1)} Z`;
  return { line, area, pts };
}

// ── Mini radar (4-axis) ───────────────────────────────────────────────────────
function MiniRadar({ dims, score, scoreColor, size = 68 }) {
  const [prog, setProg] = useState(0);
  useEffect(() => {
    const start = Date.now();
    const dur = 700;
    const raf = () => {
      const t = Math.min((Date.now() - start) / dur, 1);
      const e = 1 - Math.pow(1 - t, 3);
      setProg(e);
      if (t < 1) requestAnimationFrame(raf);
    };
    const id = setTimeout(() => requestAnimationFrame(raf), 300);
    return () => clearTimeout(id);
  }, []);

  const cx = size / 2, cy = size / 2, r = size * 0.38;
  const axes = ['disease','modality','population','quality'];
  const n = axes.length;
  const pts = axes.map((k, i) => {
    const angle = -Math.PI/2 + i * 2*Math.PI/n;
    const val = dims[k] * prog;
    return { x: cx + Math.cos(angle)*r*val, y: cy + Math.sin(angle)*r*val };
  });
  const poly = pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  // grid at 0.5
  const grid = axes.map((_, i) => {
    const angle = -Math.PI/2 + i * 2*Math.PI/n;
    return { x: cx + Math.cos(angle)*r*0.5, y: cy + Math.sin(angle)*r*0.5 };
  });
  const gridPoly = grid.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <polygon points={gridPoly} fill="none" stroke={C.border} strokeWidth="0.8"/>
      {axes.map((_, i) => {
        const angle = -Math.PI/2 + i * 2*Math.PI/n;
        return <line key={i} x1={cx} y1={cy}
          x2={cx + Math.cos(angle)*r} y2={cy + Math.sin(angle)*r}
          stroke={C.border} strokeWidth="0.7"/>;
      })}
      <polygon points={poly}
        fill={scoreColor} fillOpacity="0.15"
        stroke={scoreColor} strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  );
}

      {/* ── Body ─────────────────────────────────────────────────────────── */}
      <div style={{ display:'flex', flex:1, overflow:'hidden' }}>

        {/* ── Left sidebar ───────────────────────────────────────────────── */}
        <aside style={{ width:220, background:C.surface, borderRight:`1px solid ${C.border}`,
          padding:'20px 14px', display:'flex', flexDirection:'column', gap:4,
          overflowY:'auto', flexShrink:0 }}>

          <p style={{ fontSize:10.5, fontWeight:700, color:C.subtle,
            textTransform:'uppercase', letterSpacing:'0.08em', padding:'4px 10px', marginBottom:4 }}>
            Navigation
          </p>

          {[
            { label:'Browse Datasets', icon:'search', view:'browse' },
            { label:'Hospital Matches', icon:'match', view:'hospital-matches' },
            { label:'My Requests (3)', icon:'file', view:null },
            { label:'Purchased Data', icon:'lock', view:null },
            { label:'Spend Analytics', icon:'chart', view:null },
          ].map(item => (
            <button key={item.label}
              className={`nav-link ${pharmaView===item.view?'active':''}`}
              style={{ width:'100%', justifyContent:'flex-start', padding:'8px 10px' }}
              onClick={() => item.view && setPharmaView(item.view)}>
              <span style={{ width:14, height:14, flexShrink:0 }}>
                {item.icon === 'search' && <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" strokeWidth="1.4"/><path d="M9.5 9.5L12.5 12.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>}
                {item.icon === 'match' && <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7c0-3.3 2.7-6 6-6s6 2.7 6 6-2.7 6-6 6" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/><path d="M4.5 7l2 2 3-3.5" stroke="#0D9488" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                {item.icon === 'file' && <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="1" width="10" height="12" rx="2" stroke="currentColor" strokeWidth="1.4"/><path d="M4.5 5.5h5M4.5 8h3" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>}
                {item.icon === 'lock' && <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2.5" y="6" width="9" height="7" rx="2" stroke="currentColor" strokeWidth="1.4"/><path d="M4.5 6V4.5a2.5 2.5 0 015 0V6" stroke="currentColor" strokeWidth="1.4"/></svg>}
                {item.icon === 'chart' && <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="7" width="3" height="5" rx="1" fill="currentColor" fillOpacity="0.5"/><rect x="5.5" y="4" width="3" height="8" rx="1" fill="currentColor" fillOpacity="0.7"/><rect x="10" y="1.5" width="3" height="10.5" rx="1" fill="currentColor"/></svg>}
              </span>
              {item.label}
              {item.view === 'hospital-matches' && (
                <span style={{ marginLeft:'auto', fontSize:9.5, padding:'1px 5px', borderRadius:4,
                  background:'rgba(13,148,136,0.1)', color:C.accent, fontWeight:600, fontFamily:'DM Mono' }}>
                  4 buyers
                </span>
              )}
            </button>
          ))}

          <div style={{ height:1, background:C.border, margin:'12px 0' }}/>

          <p style={{ fontSize:10.5, fontWeight:700, color:C.subtle,
            textTransform:'uppercase', letterSpacing:'0.08em', padding:'4px 10px', marginBottom:4 }}>
            Active Filters
          </p>

          <div style={{ padding:'8px 10px', display:'flex', flexDirection:'column', gap:6 }}>
            {icdSelected.map(code => (
              <div key={code} style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <span className="icd-tag" style={{ fontSize:11 }}>{code}</span>
                <button onClick={() => toggleIcd(code)}
                  style={{ background:'none', border:'none', cursor:'pointer',
                    color:C.subtle, fontSize:14, lineHeight:1, padding:'0 2px' }}>×</button>
              </div>
            ))}
            <div style={{ fontSize:12, color:C.muted }}>
              <span style={{ fontFamily:'DM Mono', color:C.accent }}>South Asian</span>
            </div>
            <div style={{ fontSize:12, color:C.muted }}>
              Budget: <span style={{ fontFamily:'DM Mono' }}>≤${budget}K</span>
            </div>
          </div>

          <div style={{ flex:1 }}/>
          <div style={{ height:1, background:C.border, margin:'8px 0' }}/>

          <div style={{ padding:'10px 10px 0' }}>
            <p style={{ fontSize:11, fontWeight:600, color:C.primary, marginBottom:8 }}>
              Active Requests
            </p>
            {[
              { id:'REQ-004', ds:'SSKM Kolkata T2DM', status:'Under Review' },
              { id:'REQ-003', ds:'Hyderabad CKD', status:'Approved' },
            ].map(r => (
              <div key={r.id} style={{ marginBottom:8 }}>
                <div style={{ fontSize:11.5, fontWeight:500, color:C.primary }}>{r.ds}</div>
                <div style={{ display:'flex', alignItems:'center', gap:5, marginTop:2 }}>
                  <span style={{ fontFamily:'DM Mono', fontSize:10, color:C.subtle }}>{r.id}</span>
                  <span style={{ fontSize:10, padding:'1px 6px', borderRadius:4, fontWeight:500,
                    background: r.status==='Approved' ? '#F0FDF4' : '#FFFBEB',
                    color: r.status==='Approved' ? '#059669' : '#D97706',
                    border: `1px solid ${r.status==='Approved' ? '#BBF7D0' : '#FDE68A'}` }}>
                    {r.status}
                  </span>
                </div>
              </div>
            ))}
          </div>
        </aside>

        {/* ── Main content ───────────────────────────────────────────────── */}
        <main style={{ flex:1, overflowY:'auto', padding:28 }}>

          {/* Hospital Matches view */}
          {pharmaView === 'hospital-matches' && <HospitalMatchesView/>}

          {pharmaView === 'browse' && <>
          {/* Header */}
          <div className="anim-1" style={{ marginBottom:24 }}>
            <h1 style={{ fontFamily:'Playfair Display', fontSize:24, fontWeight:600, color:C.primary }}>
              Browse Clinical Datasets
            </h1>
            <p style={{ fontSize:13.5, color:C.muted, marginTop:4 }}>
              South Asian real-world data · OMOP CDM harmonized · GA4GH DUO compliant
            </p>
          </div>

          {/* Search panel */}
          <div className="card anim-2" style={{ padding:20, marginBottom:22 }}>
            {/* Mode tabs */}
            <div style={{ display:'flex', gap:8, marginBottom:18 }}>
              <button className={`tab-btn ${mode==='nl'?'tab-active':'tab-inactive'}`}
                onClick={() => setMode('nl')}>
                Natural Language
              </button>
              <button className={`tab-btn ${mode==='structured'?'tab-active':'tab-inactive'}`}
                onClick={() => setMode('structured')}>
                Structured Search
              </button>
            </div>

            {mode === 'nl' ? (
              /* Natural language mode */
              <div>
                <div style={{ position:'relative', marginBottom:12 }}>
                  <input
                    className="nl-input"
                    type="text"
                    value={nlQuery || nlTyped}
                    onChange={e => setNlQuery(e.target.value)}
                    placeholder="e.g., South Asian T2DM cohort with genomics and HbA1c data…"
                    onKeyDown={e => e.key === 'Enter' && handleNlSearch()}
                  />
                  <button
                    onClick={handleNlSearch}
                    style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)',
                      background:C.accent, border:'none', borderRadius:7, width:34, height:30,
                      display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer',
                      transition:'background 0.15s ease' }}>
                    {searching ? (
                      <div style={{ width:13, height:13, border:'2px solid white',
                        borderTopColor:'transparent', borderRadius:'50%',
                        animation:'spin 0.7s linear infinite' }}/>
                    ) : (
                      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M2 7h10M7 2l5 5-5 5" stroke="white" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    )}
                  </button>
                </div>

                {/* Interpreted parameters */}
                <div style={{ background:C.surface2, borderRadius:9, padding:'12px 14px' }}>
                  <p style={{ fontSize:11.5, fontWeight:600, color:C.muted, marginBottom:10,
                    textTransform:'uppercase', letterSpacing:'0.07em' }}>
                    Interpreted as
                  </p>
                  <div style={{ display:'flex', gap:16, flexWrap:'wrap' }}>
                    {Object.entries(NL_INTERPRETATION).map(([key, vals]) => (
                      <div key={key}>
                        <p style={{ fontSize:11, color:C.subtle, textTransform:'uppercase',
                          letterSpacing:'0.06em', marginBottom:5 }}>{key}</p>
                        {Array.isArray(vals) ? vals.map(v => (
                          <span key={v} style={{ display:'block', fontSize:12.5, color:C.primary,
                            padding:'2px 0' }}>· {v}</span>
                        )) : (
                          <span style={{ fontSize:12.5, fontFamily:'DM Mono', color:C.accent }}>{vals}</span>
                        )}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Quick examples */}
                <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:12, flexWrap:'wrap' }}>
                  <span style={{ fontSize:12, color:C.subtle }}>Try:</span>
                  {NL_EXAMPLES.slice(1).map(ex => (
                    <button key={ex} onClick={() => setNlQuery(ex)}
                      style={{ fontSize:12, padding:'4px 10px', background:'transparent',
                        border:`1px solid ${C.border}`, borderRadius:6, color:C.muted,
                        cursor:'pointer', transition:'all 0.15s', fontFamily:'DM Sans' }}
                      onMouseEnter={e => { e.target.style.borderColor=C.accent; e.target.style.color=C.accent; }}
                      onMouseLeave={e => { e.target.style.borderColor=C.border; e.target.style.color=C.muted; }}>
                      {ex}
                    </button>
                  ))}
                </div>
              </div>
            ) : (
              /* Structured search mode */
              <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
                {/* ICD-10 picker */}
                <div>
                  <label style={{ fontSize:12.5, fontWeight:600, color:C.primary,
                    display:'block', marginBottom:8 }}>Disease / ICD-10</label>
                  <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                    {ICD_OPTIONS.map(opt => {
                      const sel = icdSelected.includes(opt.code);
                      return (
                        <button key={opt.code} onClick={() => toggleIcd(opt.code)}
                          style={{ padding:'5px 12px', borderRadius:7, cursor:'pointer',
                            fontSize:12.5, fontFamily:'DM Sans',
                            background: sel ? 'rgba(13,148,136,0.08)' : C.surface2,
                            border: `1.5px solid ${sel ? '#0D9488' : C.border}`,
                            color: sel ? '#0D9488' : C.muted,
                            fontWeight: sel ? 600 : 400,
                            transition: 'all 0.15s' }}>
                          <span style={{ fontFamily:'DM Mono', fontSize:11 }}>{opt.code}</span>
                          {' · '}{opt.label}
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div style={{ display:'flex', gap:20, flexWrap:'wrap' }}>
                  {/* Population */}
                  <div style={{ flex:1, minWidth:160 }}>
                    <label style={{ fontSize:12.5, fontWeight:600, color:C.primary,
                      display:'block', marginBottom:8 }}>Population</label>
                    <select className="filter-select" value={popFilter}
                      onChange={e => setPopFilter(e.target.value)}
                      style={{ width:'100%' }}>
                      <option value="south-asian">South Asian</option>
                      <option value="bengali">Bengali-speaking</option>
                      <option value="hindi">Hindi-speaking</option>
                      <option value="any">Any</option>
                    </select>
                  </div>

                  {/* Modalities */}
                  <div style={{ flex:2, minWidth:200 }}>
                    <label style={{ fontSize:12.5, fontWeight:600, color:C.primary,
                      display:'block', marginBottom:8 }}>Required Modalities</label>
                    <div style={{ display:'flex', gap:16 }}>
                      {[
                        { key:'clinical', label:'Clinical Notes' },
                        { key:'lab',      label:'Lab Results' },
                        { key:'genomics', label:'Genomics' },
                      ].map(m => (
                        <label key={m.key} className="mod-check">
                          <input type="checkbox" checked={modalities[m.key]}
                            onChange={() => toggleMod(m.key)}/>
                          {m.label}
                        </label>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Budget slider */}
                <div>
                  <label style={{ fontSize:12.5, fontWeight:600, color:C.primary,
                    display:'block', marginBottom:8 }}>
                    Max Budget: <span style={{ fontFamily:'DM Mono', color:C.accent }}>${budget}K / yr</span>
                  </label>
                  <input type="range" className="range-slider" min={50} max={500} step={10}
                    value={budget} onChange={e => setBudget(Number(e.target.value))}
                    style={{ '--tw-range-accent': C.accent }}/>
                  <div style={{ display:'flex', justifyContent:'space-between',
                    fontSize:11, color:C.subtle, marginTop:4 }}>
                    <span>$50K</span><span>$500K</span>
                  </div>
                </div>

                <div style={{ display:'flex', justifyContent:'flex-end', gap:8 }}>
                  <button className="btn-outline"
                    onClick={() => { setIcdSelected(['E11']); setPopFilter('south-asian'); setBudget(200); }}>
                    Reset
                  </button>
                  <button className="btn-primary">
                    Search Datasets →
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* No-match agent panel */}
          {noMatch && (
            <NoMatchPanel
              onPostMarketplace={() => { setNoMatch(false); setShowResults(true); }}
              geoBlock={NON_SA_GEO.test(nlQuery || nlTyped)}
            />
          )}

          {/* Results header */}
          {showResults && (
            <div className="anim-3" style={{ display:'flex', alignItems:'center',
              justifyContent:'space-between', marginBottom:14 }}>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <h2 style={{ fontSize:15, fontWeight:600, color:C.primary }}>
                  {DATASETS.length} datasets found
                </h2>
                <span style={{ fontSize:12.5, color:C.muted }}>·</span>
                <span style={{ fontSize:12.5, color:C.muted }}>Ranked by match score</span>
              </div>
              <div style={{ display:'flex', gap:8 }}>
                <select className="filter-select" defaultValue="score">
                  <option value="score">Sort: Match Score</option>
                  <option value="quality">Sort: Quality</option>
                  <option value="price-asc">Sort: Price ↑</option>
                  <option value="fresh">Sort: Freshness</option>
                </select>
              </div>
            </div>
          )}

          {/* Dataset cards */}
          {showResults && (
            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
              {DATASETS.map((ds, i) => (
                <DatasetCard key={ds.id} ds={ds} delay={i*90}
                  onRequest={(d) => setRequestDs(d)}/>
              ))}
            </div>
          )}

          {/* Searching spinner */}
          {searching && (
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center',
              justifyContent:'center', padding:'60px 0', gap:14 }}>
              <div style={{ width:32, height:32, border:`3px solid ${C.border}`,
                borderTopColor:C.accent, borderRadius:'50%',
                animation:'spin 0.8s linear infinite' }}/>
              <p style={{ fontSize:13, color:C.muted }}>
                Matching query against 47 active datasets…
              </p>
            </div>
          )}
          </>}
        </main>

        {/* ── Right sidebar ───────────────────────────────────────────────── */}
        <aside style={{ width:268, background:C.surface, borderLeft:`1px solid ${C.border}`,
          padding:20, display:'flex', flexDirection:'column', gap:0,
          overflowY:'auto', flexShrink:0 }}>

          {/* Company stats */}
          <div className="anim-2" style={{ marginBottom:20 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
              <div style={{ width:38, height:38, borderRadius:9,
                background:'linear-gradient(135deg,#0D9488 0%,#059669 100%)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:14, fontWeight:700, color:'white', flexShrink:0 }}>NN</div>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:C.primary }}>Novo Nordisk</div>
                <div style={{ fontSize:11.5, color:C.muted }}>Global Data Science · Premium</div>
              </div>
            </div>

            {/* Stats grid */}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
              {[
                { label:'Active Requests', value:'3', color:C.accent },
                { label:'Purchased', value:'7', color:'#059669' },
                { label:'YTD Spend', value:'$1.2M', color:C.primary },
                { label:'Datasets Viewed', value:'24', color:C.muted },
              ].map(s => (
                <div key={s.label} className="card" style={{ padding:'10px 12px' }}>
                  <div style={{ fontFamily:'DM Mono', fontSize:17, fontWeight:500, color:s.color }}>
                    {s.value}
                  </div>
                  <div style={{ fontSize:11, color:C.subtle, marginTop:2 }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ height:1, background:C.border, marginBottom:18 }}/>

          {/* Area chart */}
          <div className="anim-3">
            <h3 style={{ fontSize:12.5, fontWeight:600, color:C.primary, marginBottom:4 }}>
              Data Access Activity
            </h3>
            <p style={{ fontSize:11, color:C.muted, marginBottom:10 }}>Jul 2024 – Mar 2025</p>
            <AreaChart/>
            <div style={{ display:'flex', justifyContent:'space-between', marginTop:6 }}>
              <span style={{ fontSize:11, color:C.muted }}>Queries · Requests · Downloads</span>
              <span style={{ fontFamily:'DM Mono', fontSize:11, color:C.accent }}>↑ 62%</span>
            </div>
          </div>

          <div style={{ height:1, background:C.border, margin:'18px 0' }}/>

          {/* Recommended */}
          <div className="anim-4">
            <h3 style={{ fontSize:12.5, fontWeight:600, color:C.primary, marginBottom:12 }}>
              Recommended for You
            </h3>
            {[
              { title:'Chennai T2DM + CKD', score:88, label:'New' },
              { title:'Mumbai Metabolic Cohort', score:82, label:'Updated' },
            ].map((r,i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:10,
                padding:'10px 0', borderBottom: i===0 ? `1px solid ${C.border}` : 'none' }}>
                <div style={{ width:36, height:36, borderRadius:8,
                  background:`${i===0?'#059669':'#0D9488'}15`,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontFamily:'DM Mono', fontSize:13, fontWeight:500,
                  color: i===0 ? '#059669' : '#0D9488', flexShrink:0 }}>
                  {r.score}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12.5, fontWeight:500, color:C.primary }}>{r.title}</div>
                  <span style={{ fontSize:10.5, padding:'1px 6px', borderRadius:4, fontWeight:600,
                    background: i===0 ? '#F0FDF4' : '#F0F9FF',
                    color: i===0 ? '#059669' : '#0D9488',
                    border: `1px solid ${i===0?'#BBF7D0':'#BAE6FD'}` }}>
                    {r.label}
                  </span>
                </div>
                <button style={{ background:'none', border:`1px solid ${C.border}`,
                  borderRadius:6, padding:'4px 8px', fontSize:11.5, color:C.muted,
                  cursor:'pointer', transition:'all 0.15s' }}>View</button>
              </div>
            ))}
          </div>

          <div style={{ height:1, background:C.border, margin:'18px 0' }}/>

          {/* Protocol badges */}
          <div className="anim-5">
            <h3 style={{ fontSize:12.5, fontWeight:600, color:C.primary, marginBottom:10 }}>
              Compliance
            </h3>
            {[
              { label:'GA4GH DUO', desc:'Data Use Ontology', color:'#0D9488', bg:'rgba(13,148,136,0.06)', border:'rgba(13,148,136,0.2)' },
              { label:'OMOP CDM', desc:'v5.4 harmonized', color:'#0D9488', bg:'rgba(13,148,136,0.08)', border:'rgba(13,148,136,0.25)' },
              { label:'IRB Required', desc:'Ethics approval', color:'#D97706', bg:'#FFFBEB', border:'#FDE68A' },
            ].map(b => (
              <div key={b.label} style={{ display:'flex', alignItems:'center', gap:9,
                marginBottom:8, padding:'7px 10px', borderRadius:8,
                background:b.bg, border:`1px solid ${b.border}` }}>
                <div style={{ width:6, height:6, borderRadius:'50%', background:b.color, flexShrink:0 }}/>
                <div>
                  <div style={{ fontSize:12, fontWeight:600, color:b.color }}>{b.label}</div>
                  <div style={{ fontSize:11, color:C.muted }}>{b.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </aside>
      </div>

      {/* ── Request modal ─────────────────────────────────────────────────── */}
      {requestDs && (
        <RequestModal ds={requestDs} onClose={() => setRequestDs(null)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
